name: easynet release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: easynet-linux-amd64
            binary: easynet
            package: easynet-linux-amd64.tar.gz
            archive: tar
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact: easynet-windows-amd64
            binary: easynet.exe
            package: easynet-windows-amd64.zip
            archive: zip
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            artifact: easynet-macos-amd64
            binary: easynet
            package: easynet-macos-amd64.tar.gz
            archive: tar
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          staging="staging/${{ matrix.artifact }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$staging/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "$staging" && 7z a "../../${{ matrix.package }}" .)
          else
            chmod +x "$staging/${{ matrix.binary }}"
            tar -czf "${{ matrix.package }}" -C "$staging" .
          fi

          echo "PACKAGE_PATH=${{ matrix.package }}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
